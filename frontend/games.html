<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏大厅</title>
    <style>
        :root {
            --pink: #F4A6A0; --pink-light: #FAD4CF; --mint: #A8E6CF; --mint-dark: #7DD3AE;
            --cream: #FFE8D0; --yellow: #FFF5BA; --purple: #C9B8D8; --dark: #2D2D2D;
            --border: 2px solid #2D2D2D; --shadow: 4px 4px 0px #2D2D2D;
            --shadow-hover: 6px 6px 0px #2D2D2D; --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, var(--pink-light) 0%, #FDECE8 50%, var(--cream) 100%); min-height:100vh; color:var(--dark); overflow-x:hidden; }
        body::before { content:''; position:fixed; top:8%; right:3%; width:100px; height:100px; background:var(--cream); border:var(--border); border-radius:50%; z-index:0; animation:float 6s ease-in-out infinite; }
        body::after { content:''; position:fixed; bottom:12%; left:2%; width:70px; height:70px; background:var(--purple); border:var(--border); border-radius:50%; transform:rotate(45deg); z-index:0; animation:float 8s ease-in-out infinite reverse; }
        @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-20px) rotate(5deg)} }

        /* 登录 */
        .auth-layer { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:1000; background:linear-gradient(135deg,var(--pink)0%,var(--pink-light)50%,#FDECE8 100%); }
        .auth-wrapper { position:relative; width:100%; max-width:780px; min-height:460px; display:flex; align-items:stretch; background:#fff; border:var(--border); box-shadow:8px 8px 0 rgba(45,45,45,0.2); overflow:hidden; }
        .auth-brand { flex:1; background:var(--pink); padding:40px 32px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; position:relative; overflow:hidden; }
        .auth-brand::before { content:''; position:absolute; top:24px; left:24px; width:50px; height:50px; background:var(--cream); border:var(--border); border-radius:50%; }
        .auth-brand::after { content:''; position:absolute; bottom:30px; right:20px; width:60px; height:60px; background:var(--purple); border:var(--border); transform:rotate(45deg); }
        .brand-logo { font-size:48px; margin-bottom:12px; z-index:1; }
        .brand-title { font-size:28px; font-weight:800; margin-bottom:6px; letter-spacing:2px; z-index:1; }
        .brand-slogan { font-size:13px; opacity:0.75; line-height:1.8; z-index:1; }
        .auth-form-area { flex:1; padding:40px 36px; display:flex; flex-direction:column; justify-content:center; }
        .auth-tabs { display:flex; gap:10px; margin-bottom:24px; }
        .auth-tab { flex:1; text-align:center; padding:12px; background:#fff; border:var(--border); cursor:pointer; font-size:15px; font-weight:700; transition:all 0.2s; }
        .auth-tab:hover { transform:translate(-2px,-2px); box-shadow:var(--shadow); }
        .auth-tab.active { background:var(--dark); color:#fff; }
        .auth-input { width:100%; padding:12px 16px; margin-bottom:12px; border:var(--border); border-radius:8px; font-size:14px; outline:none; background:#fff; }
        .auth-input:focus { border-color:var(--mint); }
        .auth-btn { width:100%; padding:14px; margin-top:8px; background:var(--mint); border:var(--border); border-radius:8px; font-size:16px; font-weight:700; cursor:pointer; transition:all 0.2s; }
        .auth-btn:hover { transform:translate(-2px,-2px); box-shadow:var(--shadow); }
        .auth-error { color:#e74c3c; font-size:13px; margin-top:8px; display:none; text-align:center; font-weight:600; }

        /* 主容器 */
        .app-container { display:none; flex-direction:column; height:100vh; position:relative; z-index:1; }
        .app-container.show { display:flex; }

        /* 顶部栏 */
        .top-bar { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:#fff; border-bottom:var(--border); }
        .top-bar-left { display:flex; align-items:center; gap:12px; }
        .top-bar-title { font-size:20px; font-weight:800; }
        .top-bar-stats { display:flex; gap:20px; font-size:13px; font-weight:600; }
        .top-bar-stats span { display:flex; align-items:center; gap:4px; }
        .top-bar-right { display:flex; align-items:center; gap:10px; }
        .user-avatar { width:36px; height:36px; border-radius:50%; background:var(--purple); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; border:var(--border); }
        .btn { padding:8px 16px; border:var(--border); border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.15s; background:#fff; }
        .btn:hover { transform:translate(-2px,-2px); box-shadow:var(--shadow); }
        .btn-primary { background:var(--mint)!important; }
        .btn-danger { background:var(--pink-light)!important; }
        .btn-link { background:none!important; border:none!important; color:#888; font-size:12px; text-decoration:underline; }

        /* 大厅 */
        .lobby-body { display:flex; flex:1; overflow:hidden; }
        .room-sidebar { width:320px; border-right:var(--border); background:#fff; display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; }
        .room-sidebar-header { padding:12px 16px; border-bottom:var(--border); font-weight:700; font-size:14px; display:flex; justify-content:space-between; align-items:center; }
        .room-list { flex:1; overflow-y:auto; padding:8px; }
        .room-card { border:var(--border); border-radius:var(--radius); background:#fff; padding:12px; margin-bottom:10px; cursor:pointer; transition:all 0.2s; }
        .room-card:hover { box-shadow:var(--shadow-hover); transform:translate(-2px,-2px); }
        .room-card.my-room { border-color:var(--mint); background:#f8fffb; }
        .room-card-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        .room-card-icon { font-size:22px; }
        .room-card-name { font-weight:700; font-size:14px; flex:1; }
        .room-card-status { font-size:11px; font-weight:700; padding:2px 8px; border-radius:10px; }
        .room-card-status.waiting { background:var(--mint); }
        .room-card-status.playing { background:var(--yellow); }
        .room-card-meta { display:flex; align-items:center; gap:10px; font-size:12px; color:#666; }
        .room-card-progress { flex:1; height:4px; background:#eee; border-radius:2px; overflow:hidden; }
        .room-card-progress-fill { height:100%; background:var(--mint); border-radius:2px; transition:width 0.3s; }

        .game-main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#fafafa; }
        .game-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; color:#aaa; font-weight:600; }

        /* 弹窗 */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:999; align-items:center; justify-content:center; }
        .modal-overlay.show { display:flex; }
        .modal-box { background:#fff; border:var(--border); border-radius:16px; box-shadow:var(--shadow-hover); width:90%; max-width:460px; overflow:hidden; }
        .modal-header { padding:16px 20px; border-bottom:var(--border); display:flex; align-items:center; justify-content:space-between; font-weight:700; font-size:16px; }
        .modal-close { width:32px; height:32px; border:var(--border); border-radius:50%; background:#fff; cursor:pointer; font-size:18px; font-weight:700; display:flex; align-items:center; justify-content:center; }
        .modal-close:hover { background:var(--pink-light); }
        .modal-body { padding:20px; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-weight:700; font-size:13px; margin-bottom:4px; }
        .form-group input, .form-group select { width:100%; padding:10px 14px; border:var(--border); border-radius:8px; font-size:14px; outline:none; background:#fff; }
        .form-group input:focus, .form-group select:focus { border-color:var(--mint); }
        .game-type-options { display:flex; gap:8px; flex-wrap:wrap; }
        .game-type-option { flex:1; min-width:80px; padding:12px 8px; border:var(--border); border-radius:10px; text-align:center; cursor:pointer; transition:all 0.2s; background:#fff; font-size:13px; font-weight:600; }
        .game-type-option:hover { border-color:var(--mint); background:#f8fffb; }
        .game-type-option.active { border-color:var(--mint); background:var(--mint); }
        .game-type-option .gto-icon { font-size:22px; display:block; margin-bottom:4px; }

        /* 五子棋 */
        .gomoku-container { display:flex; flex-direction:column; align-items:center; gap:16px; padding:20px; }
        .gomoku-board-wrapper { position:relative; background:#DEB887; border:var(--border); border-radius:8px; padding:8px; box-shadow:var(--shadow); }
        .gomoku-board { display:block; cursor:pointer; border-radius:4px; }
        .gomoku-info-bar { display:flex; align-items:center; gap:20px; padding:10px 20px; background:#fff; border:var(--border); border-radius:var(--radius); font-size:13px; font-weight:700; flex-wrap:wrap; }
        .gomoku-player-tag { display:flex; align-items:center; gap:6px; }
        .gomoku-stone { display:inline-block; width:18px; height:18px; border-radius:50%; border:2px solid #333; }
        .gomoku-stone.black { background:#222; } .gomoku-stone.white { background:#fff; }
        .gomoku-status-tag { padding:4px 12px; border-radius:12px; font-size:12px; font-weight:700; }
        .gomoku-status-tag.waiting { background:var(--cream); } .gomoku-status-tag.playing { background:var(--yellow); }
        .gomoku-status-tag.ready { background:var(--mint); } .gomoku-status-tag.finished { background:var(--pink-light); }
        .gomoku-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
        .gomoku-actions button { padding:8px 18px; font-size:13px; font-weight:700; border:var(--border); border-radius:8px; cursor:pointer; transition:all 0.15s; background:#fff; }
        .gomoku-actions button:hover { transform:translate(-2px,-2px); box-shadow:var(--shadow); }
        .btn-ready { background:var(--mint)!important; } .btn-unready { background:var(--pink-light)!important; } .btn-reset { background:var(--yellow)!important; }
        .gomoku-win-overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; border-radius:8px; z-index:10; }
        .gomoku-win-box { background:#fff; border:var(--border); border-radius:16px; padding:24px 36px; text-align:center; box-shadow:var(--shadow-hover); }
        .gomoku-win-box h3 { font-size:20px; margin-bottom:8px; }
        .gomoku-win-box .winner-name { font-size:26px; color:#e74c3c; margin-bottom:12px; }

        /* 中国象棋 */
        .chess-container { display:flex; gap:20px; flex-wrap:wrap; align-items:flex-start; justify-content:center; }
        .chess-board-wrapper { position:relative; flex-shrink:0; }
        .chess-board { display:block; border-radius:8px; cursor:pointer; box-shadow:0 4px 20px rgba(0,0,0,0.15); }
        .chess-info-bar { display:flex; flex-direction:column; gap:10px; min-width:160px; }
        .chess-player-tag { display:flex; align-items:center; gap:8px; padding:10px 14px; background:#fff; border-radius:10px; font-size:14px; font-weight:600; border:2px solid transparent; }
        .chess-player-tag.active-turn { border-color:var(--yellow); box-shadow:0 0 10px rgba(240,165,0,0.3); }
        .chess-color-dot { width:16px; height:16px; border-radius:50%; flex-shrink:0; }
        .chess-color-dot.red { background:#d32f2f; border:2px solid #b71c1c; }
        .chess-color-dot.black { background:#222; border:2px solid #555; }
        .chess-status-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; margin-left:auto; }
        .chess-status-tag.waiting{background:var(--cream)} .chess-status-tag.playing{background:var(--yellow)} .chess-status-tag.ready{background:var(--mint)}
        .chess-status-tag.finished{background:var(--pink-light)} .chess-status-tag.check{background:#ff5252;color:#fff;}
        .chess-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
        .chess-actions button { padding:8px 16px; border:none; border-radius:8px; cursor:pointer; font-size:13px; font-weight:700; color:#333; transition:transform 0.15s, opacity 0.15s; }
        .chess-actions button:hover { transform:scale(1.03); opacity:0.9; }
        .chess-btn-ready{background:var(--mint)!important} .chess-btn-unready{background:var(--pink-light)!important}
        .chess-btn-reset{background:var(--yellow)!important} .chess-btn-undo{background:#7986cb!important;color:#fff!important}
        .chess-selected-dot{position:absolute;width:18px;height:18px;border-radius:50%;pointer-events:none;z-index:5;background:rgba(255,255,0,0.7);border:2px solid #f90;}
        .chess-move-hint{position:absolute;width:14px;height:14px;border-radius:50%;pointer-events:none;z-index:4;background:rgba(0,200,0,0.5);border:2px solid #080;}

        /* 飞行棋 */
        .aero-container { display:flex; gap:20px; flex-wrap:wrap; align-items:flex-start; justify-content:center; }
        .aero-board-wrapper { position:relative; flex-shrink:0; }
        .aero-board-canvas { border:var(--border); border-radius:8px; box-shadow:var(--shadow); cursor:default; display:block; }
        .aero-info-panel { display:flex; flex-direction:column; gap:10px; min-width:200px; max-width:280px; }
        .aero-player-card { padding:10px 14px; background:#fff; border-radius:10px; font-size:13px; font-weight:600; border:2px solid transparent; }
        .aero-player-card.active-turn { border-color:#f0a500; box-shadow:0 0 10px rgba(240,165,0,0.3); }
        .aero-player-card.me { background:#f8fffb; }
        .aero-color-dot { width:16px; height:16px; border-radius:50%; display:inline-block; margin-right:6px; border:2px solid #333; vertical-align:middle; }
        .aero-color-dot.red{background:#e74c3c} .aero-color-dot.yellow{background:#f1c40f} .aero-color-dot.blue{background:#3498db} .aero-color-dot.green{background:#2ecc71}
        .aero-dice-area { display:flex; align-items:center; gap:12px; margin:10px 0; }
        .aero-dice { width:64px; height:64px; background:#fff; border:var(--border); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:800; cursor:pointer; transition:all 0.15s; box-shadow:var(--shadow); }
        .aero-dice:hover { transform:translate(-2px,-2px); box-shadow:var(--shadow-hover); }
        .aero-dice.rolling { animation:dice-shake 0.6s ease-in-out; }
        @keyframes dice-shake { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(20deg)} 50%{transform:rotate(-15deg)} 75%{transform:rotate(10deg)} }
        .aero-piece-select { display:flex; gap:8px; flex-wrap:wrap; }
        .aero-piece-btn { width:44px; height:44px; border-radius:50%; border:3px solid #333; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; }
        .aero-piece-btn:hover { transform:scale(1.1); } .aero-piece-btn.selected { border-color:#f0a500; box-shadow:0 0 10px rgba(240,165,0,0.5); }
        .aero-piece-btn.disabled { opacity:0.35; cursor:not-allowed; }

        /* 你画我猜 */
        .drawguess-container { display:flex; gap:16px; height:100%; padding:12px; }
        .drawguess-canvas-area { flex:1; display:flex; flex-direction:column; gap:8px; }
        .drawguess-tools { display:flex; align-items:center; gap:8px; padding:8px 12px; background:#fff; border:var(--border); border-radius:8px; flex-wrap:wrap; }
        .drawguess-tools button { padding:6px 12px; border:var(--border); border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; background:#fff; transition:all 0.15s; }
        .drawguess-tools button:hover { transform:translate(-1px,-1px); box-shadow:var(--shadow); }
        .drawguess-tools button.active { background:var(--mint); }
        .drawguess-color-picker { display:flex; gap:4px; align-items:center; }
        .drawguess-color-btn { width:24px; height:24px; border-radius:50%; border:2px solid #333; cursor:pointer; transition:all 0.15s; }
        .drawguess-color-btn:hover { transform:scale(1.2); }
        .drawguess-color-btn.active { border-width:4px; }
        .drawguess-slider { accent-color:var(--mint); height:6px; width:80px; }
        .drawguess-canvas-wrap { flex:1; background:#fff; border:var(--border); border-radius:8px; overflow:hidden; position:relative; }
        .drawguess-canvas-wrap canvas { width:100%; height:100%; display:block; cursor:crosshair; }
        .drawguess-word-display { text-align:center; padding:8px; font-size:18px; font-weight:800; color:#e74c3c; letter-spacing:4px; }
        .drawguess-sidebar { width:260px; display:flex; flex-direction:column; gap:10px; flex-shrink:0; }
        .drawguess-timer { text-align:center; font-size:28px; font-weight:800; padding:8px; background:#fff; border:var(--border); border-radius:var(--radius); }
        .drawguess-timer.urgent { color:#e74c3c; animation:blink 0.5s infinite; }
        @keyframes blink { 50%{opacity:0.5} }
        .drawguess-player-list { padding:10px; background:#fff; border:var(--border); border-radius:var(--radius); max-height:150px; overflow-y:auto; }
        .drawguess-player-tag { font-size:12px; padding:4px 8px; margin:2px 0; border-radius:6px; display:flex; justify-content:space-between; }
        .drawguess-player-tag.drawer { background:var(--yellow); font-weight:700; }
        .drawguess-chat { flex:1; display:flex; flex-direction:column; background:#fff; border:var(--border); border-radius:var(--radius); overflow:hidden; min-height:0; }
        .drawguess-chat-messages { flex:1; overflow-y:auto; padding:8px; font-size:12px; }
        .drawguess-chat-item { padding:4px 0; border-bottom:1px solid #f0f0f0; }
        .drawguess-chat-item .name { font-weight:700; color:var(--purple); }
        .drawguess-chat-item .correct { color:#27ae60; font-weight:700; }
        .drawguess-chat-system { color:#e74c3c; font-weight:600; }
        .drawguess-chat-input-area { display:flex; border-top:var(--border); }
        .drawguess-chat-input { flex:1; padding:8px 12px; border:none; outline:none; font-size:13px; }
        .drawguess-words-picker { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
        .drawguess-word-opt { padding:8px 16px; border:var(--border); border-radius:8px; cursor:pointer; font-weight:700; font-size:14px; background:#fff; transition:all 0.15s; }
        .drawguess-word-opt:hover { background:var(--mint); transform:translate(-2px,-2px); box-shadow:var(--shadow); }

        /* 通用 */
        .room-detail { display:flex; flex-direction:column; height:100%; }
        .room-detail-header { padding:14px 20px; background:#fff; border-bottom:var(--border); display:flex; align-items:center; gap:10px; }
        .room-detail-body { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
        .room-detail-actions { padding:14px 20px; background:#fff; border-top:var(--border); display:flex; gap:10px; flex-wrap:wrap; }
        .room-detail-actions button { padding:8px 18px; font-size:13px; font-weight:700; border:var(--border); border-radius:8px; cursor:pointer; transition:all 0.15s; background:#fff; }
        .room-detail-actions button:hover { transform:translate(-2px,-2px); box-shadow:var(--shadow); }
        .btn-leave { background:var(--pink-light)!important; } .btn-dismiss { background:#eee!important; color:#e74c3c!important; }
        .player-list { display:flex; flex-wrap:wrap; gap:12px; }
        .player-item { display:flex; align-items:center; gap:10px; padding:10px 14px; background:#fff; border:var(--border); border-radius:12px; min-width:160px; }
        .player-item-avatar { width:36px; height:36px; border-radius:50%; background:var(--purple); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; position:relative; }
        .player-item-avatar .online-dot { position:absolute; bottom:0; right:0; width:8px; height:8px; background:#5cd859; border:1.5px solid #fff; border-radius:50%; }
        .player-item-name { font-weight:700; font-size:13px; }
        .player-item-owner { font-size:10px; color:#f0a500; font-weight:700; }
        .spectator-badge { padding:2px 8px; background:var(--purple); color:#fff; border-radius:10px; font-size:11px; font-weight:700; }
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--dark); color:#fff; padding:12px 24px; border-radius:10px; font-weight:700; font-size:14px; z-index:2000; opacity:0; transition:opacity 0.3s; }
        .toast.show { opacity:1; }

        @media (max-width:768px) {
            .auth-wrapper { flex-direction:column; max-width:95%; min-height:auto; }
            .lobby-body { flex-direction:column; }
            .room-sidebar { width:100%; max-height:250px; border-right:none; border-bottom:var(--border); }
            .game-type-options { flex-direction:column; }
            .drawguess-container { flex-direction:column; }
            .drawguess-sidebar { width:100%; flex-direction:row; flex-wrap:wrap; max-height:200px; }
        .drawguess-sidebar > * { flex:1; min-width:120px; }
    }

    /* ==================== 斗地主样式 ==================== */
    .ddz-container { display:flex; flex-direction:column; height:100%; background:linear-gradient(180deg, #0a5c36 0%, #0d7a4a 50%, #0a5c36 100%); color:#fff; padding:12px; position:relative; overflow:hidden; min-height:520px; }
    .ddz-top-bar { display:flex; justify-content:space-between; align-items:center; padding:4px 12px; font-size:13px; font-weight:600; }
    .ddz-table { flex:1; display:flex; flex-direction:column; justify-content:space-between; position:relative; max-width:900px; margin:0 auto; width:100%; }
    .ddz-player-area { display:flex; justify-content:center; align-items:center; gap:12px; padding:6px 0; }
    .ddz-player-area.opponent { flex-direction:row; }
    .ddz-player-area.me { flex-direction:column; }
    .ddz-player-card { display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 14px; background:rgba(255,255,255,0.12); border-radius:12px; min-width:100px; backdrop-filter:blur(4px); }
    .ddz-player-card.is-landlord { border:2px solid #ffd700; background:rgba(255,215,0,0.15); }
    .ddz-player-card.current-turn { box-shadow:0 0 20px rgba(255,215,0,0.6); }

    <div class="toast" id="toast"></div>

    <script>
        // ==================== 全局变量 ====================
        let ws = null, myUsername = '', myToken = '', currentRoomId = null, selectedGameType = 'gomoku', reconnectTimer = null, publicWsUrl = '', wsManualClose = false;
        let gomokuRoomData = null, chessRoomData = null, chessSelected = null, chessMoveHints = [];

        const CHESS_PIECE_NAMES = {
            'red':{'rook':'车','horse':'马','elephant':'相','advisor':'仕','king':'帅','cannon':'炮','pawn':'兵'},
            'black':{'rook':'車','horse':'馬','elephant':'象','advisor':'士','king':'将','cannon':'砲','pawn':'卒'}
        };

        // ==================== 飞行棋游戏状态 ====================
        const AERO_COLORS = ['red','yellow','blue','green'];
        const AERO_COLORS_HEX = {red:'#e74c3c',yellow:'#f1c40f',blue:'#3498db',green:'#2ecc71'};
        const AERO_COLORS_LIGHT = {red:'#fadbd8',yellow:'#fef9e7',blue:'#d6eaf8',green:'#d5f5e3'};
        const AERO_COLOR_NAMES = {red:'红',yellow:'黄',blue:'蓝',green:'绿'};
        // 4个玩家的起点位置（在52格轨道上的位置）
        const AERO_START_POS = {red:0, yellow:13, blue:26, green:39};
        // 每个玩家的终点入口位置
        const AERO_HOME_ENTRY = {red:50, yellow:11, blue:24, green:37};
        // 终点6格坐标映射（canvas坐标）
        const AERO_HOME_COORDS = {
            red:  [{x:4,  y:6.5},{x:5,  y:6.5},{x:6,  y:6.5},{x:6,  y:7.5},{x:6,  y:8.5},{x:6,  y:9.5}],
            yellow:[{x:6.5,y:4}, {x:6.5,y:5}, {x:6.5,y:6}, {x:7.5,y:6}, {x:8.5,y:6}, {x:9.5,y:6}],
            blue:  [{x:14, y:6.5},{x:13, y:6.5},{x:12, y:6.5},{x:12, y:7.5},{x:12, y:8.5},{x:12, y:9.5}],
            green: [{x:6.5,y:14},{x:6.5,y:13},{x:6.5,y:12},{x:7.5,y:12},{x:8.5,y:12},{x:9.5,y:12}]
        };
        // 飞机位置(grid坐标)
        const AERO_HANGAR_COORDS = {
            red: [{x:2, y:8}, {x:2.5, y:8}, {x:2, y:8.5}, {x:2.5, y:8.5}],
            yellow: [{x:8, y:2}, {x:8.5, y:2}, {x:8, y:2.5}, {x:8.5, y:2.5}],
            blue: [{x:14, y:8}, {x:14.5, y:8}, {x:14, y:8.5}, {x:14.5, y:8.5}],
            green: [{x:8, y:14}, {x:8.5, y:14}, {x:8, y:14.5}, {x:8.5, y:14.5}]
        };
        // 轨道坐标（52格，从红起点开始顺时针）
        // 0-4: 红起点前第一段, 5: 红起点拐角前, 6-10: 上方横线, 11: 右上角, 12: 黄起点, ...
        let aeroTrackCoords = null; // 动态计算
        let aeroGameState = null; // {players, currentPlayerIndex, dice, phase, diceRolled, selectablePieces}

        function buildAeroTrack() {
            const coords = [];
            // 红起点(0)在最左边偏下: col=3, row=10
            // 顺时针:下→右→上→左
            // 底部横线: 红起点向左到左下角,然后左竖线上,左上角,上横线右,右上角,右竖线下,右下角,底部横线右回起点
            // 简化轨道 (15x15 网格, 含4个基地在角)
            const track = [];
            // 底部: col 1-8, row 10 (9格 → 红0-4前半)
            for(let c=1;c<=8;c++) track.push({x:c,y:10});
            // 右下角: col 9, row 8-10
            track.push({x:9,y:9});
            // 右竖线向上: col 9, row 4-8
            for(let r=8;r>=4;r--) track.push({x:9,y:r});
            // 右上角: col 8, row 1-4, col 7, row 1
            track.push({x:8,y:1});
            // 上横线右: col 6-7, row 1
            for(let c=7;c>=6;c--) track.push({x:c,y:1});
            // 黄起点段: col 5, row 1-8
            for(let r=2;r<=8;r++) track.push({x:5,y:r});
            // 右下角2
            track.push({x:4,y:9});
            // 左竖线下: col 4, row 4-8
            for(let r=8;r>=4;r--) track.push({x:4,y:r});
            // 左上角
            track.push({x:3,y:1});
            // 上横线左: col 2, row 1
            track.push({x:2,y:1});
            // 蓝起点段: col 1, row 1-8
            for(let r=2;r<=8;r++) track.push({x:1,y:r});
            // 左bottom
            track.push({x:1,y:9});
            return track;
        }
        // 初始化坐标系
        aeroTrackCoords = buildAeroTrack();
        // 确保52格
        if(aeroTrackCoords.length<52){
            const extra = 52 - aeroTrackCoords.length;
            const last = aeroTrackCoords[aeroTrackCoords.length-1];
            for(let i=0;i<extra;i++) aeroTrackCoords.push({x:last.x, y:last.y});
        }

        // ==================== 你画我猜游戏状态 ====================
        let drawGuessState = null; // {status:'waiting'|'playing'|'word_pick'|'round_end', currentDrawer, word, wordChoices, timer, scores, chat:[], players:[]}
        let dgIsDrawing = false, dgCurrentTool = 'pen', dgCurrentColor = '#333333', dgLineWidth = 3;
        let dgTimerInterval = null;

        const DRAW_GUESS_WORDS = [
            // 简单
            '苹果','太阳','月亮','星星','花朵','大树','小鱼','小鸟','房子','汽车',
            '蝴蝶','彩虹','雪人','西瓜','草莓','兔子','猫咪','小狗','笑脸','爱心',
            '书本','铅笔','眼镜','帽子','雨伞','气球','风筝','足球','篮球','钢琴',
            '蛋糕','冰淇淋','汉堡','面条','饺子','包子','月饼','圣诞树','灯笼','鞭炮',
            // 中等
            '长城','天安门','熊猫','长城','兵马俑','太极','龙舟','灯笼','鞭炮','舞狮',
            '孙悟空','唐僧','猪八戒','飞机','火箭','潜水艇','坦克','直升机','自行车','公共汽车',
            '长颈鹿','大象','狮子','老虎','鳄鱼','海豚','鲨鱼','企鹅','孔雀','鹦鹉',
            '向日葵','仙人掌','蘑菇','椰子树','玫瑰','荷花','樱花','雪花','闪电','龙卷风',
            // 较难
            '自由女神像','埃菲尔铁塔','金字塔','比萨斜塔','蒙娜丽莎','呐喊','星空','日出','黄昏','台风',
            '海盗船','城堡','灯塔','风车','望远镜','显微镜','指南针','书法','剪纸','京剧脸谱'
        ];

        function getRandomWords(n) {
            const shuffled = [...DRAW_GUESS_WORDS].sort(()=>Math.random()-0.5);
            return shuffled.slice(0, n);
        }

        // ==================== 工具函数 ====================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(t._tid); t._tid = setTimeout(()=>t.classList.remove('show'),2500);
        }
        function sendWs(data) {
            if(ws && ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(data));
        }

        // ==================== 认证 ====================
        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
            document.querySelector('.auth-tab[data-tab="'+tab+'"]').classList.add('active');
            document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
            document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
            document.getElementById('authError').style.display='none';
        }
        function showAuthError(msg) {
            const el=document.getElementById('authError'); el.textContent=msg; el.style.display='block';
        }
        async function checkLoginStatus(){
            try{
                const res=await fetch('/api/check_login'); const data=await res.json();
                if(data.code===200 && data.data.logged_in){
                    myUsername=data.data.username; myToken=data.data.token||localStorage.getItem('chat_token')||'';
                    publicWsUrl=data.data.public_ws_url||'';
                    if(myToken) localStorage.setItem('chat_token',myToken);
                    enterApp(); return true;
                }
            }catch(e){}
            return false;
        }
        async function doLogin(){
            const u=document.getElementById('loginUser').value.trim(), p=document.getElementById('loginPass').value;
            if(!u||!p){showAuthError('请填写用户名和密码');return;}
            try{
                const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
                const data=await res.json();
                if(data.code===200){
                    myUsername=data.data.username;myToken=data.data.token;localStorage.setItem('chat_token',myToken);
                    try{const info=await fetch('/api/server_info');const id=await info.json();if(id.code===200)publicWsUrl=id.data.ws_url||'';}catch(e){}
                    enterApp();
                }
                else showAuthError(data.msg);
            }catch(e){showAuthError('网络错误');}
        }
        async function doRegister(){
            const u=document.getElementById('regUser').value.trim(), n=document.getElementById('regNick').value.trim()||u, p=document.getElementById('regPass').value;
            if(!u||!p){showAuthError('请填写用户名和密码');return;}
            try{
                const res=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,nickname:n,password:p})});
                const data=await res.json();
                if(data.code===200){alert('注册成功！请登录');switchAuthTab('login');document.getElementById('loginUser').value=u;document.getElementById('loginPass').focus();}
                else showAuthError(data.msg);
            }catch(e){showAuthError('网络错误');}
        }
        function enterApp(){

        function drawGomokuBoard(gs){
            const c=document.getElementById('gomokuCanvas'); if(!c)return;
            const ctx=c.getContext('2d'), size=15, cs=30, pad=15, bs=cs*(size-1)+pad*2;
            c.width=bs; c.height=bs;
            ctx.fillStyle='#DEB887'; ctx.fillRect(0,0,bs,bs);
            ctx.strokeStyle='#333'; ctx.lineWidth=1;
            for(let i=0;i<size;i++){const p=pad+i*cs;ctx.beginPath();ctx.moveTo(pad,p);ctx.lineTo(pad+(size-1)*cs,p);ctx.stroke();ctx.beginPath();ctx.moveTo(p,pad);ctx.lineTo(p,pad+(size-1)*cs);ctx.stroke();}
            const stars=[[7,7],[3,3],[3,11],[11,3],[11,11],[3,7],[7,3],[7,11],[11,7]];
            ctx.fillStyle='#333'; stars.forEach(([sx,sy])=>{ctx.beginPath();ctx.arc(pad+sx*cs,pad+sy*cs,4,0,Math.PI*2);ctx.fill();});
            const board=gs.board||[];
            for(let y=0;y<size;y++){for(let x=0;x<size;x++){const cell=(board[y]||[])[x];if(cell===0)continue;
                const cx=pad+x*cs,cy=pad+y*cs,r=cs/2-1;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
                const grad=ctx.createRadialGradient(cx-3,cy-3,2,cx,cy,r);
                if(cell===1){grad.addColorStop(0,'#555');grad.addColorStop(1,'#111');}
                else{grad.addColorStop(0,'#fff');grad.addColorStop(1,'#ccc');}
                ctx.fillStyle=grad;ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.stroke();}}
            if(gs.last_move_x!=null){const lx=pad+gs.last_move_x*cs,ly=pad+gs.last_move_y*cs;ctx.fillStyle=gs.current_turn===1?'#fff':'#f00';ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.fill();}
            if(gs.status==='finished'||gs.winner){const w=document.getElementById('gomokuBoardWrapper');if(w&&!w.querySelector('.gomoku-win-overlay')){const o=document.createElement('div');o.className='gomoku-win-overlay';o.innerHTML='<div class="gomoku-win-box"><h3>游戏结束</h3><div class="winner-name">'+(gs.winner?(gs.winner===myUsername?'你赢了！🎉':escapeHtml(gs.winner)+' 获胜！'):'平局！🤝')+'</div></div>';w.appendChild(o);}}
        }

        document.addEventListener('click',function(e){
            const c=document.getElementById('gomokuCanvas'); if(!c||!gomokuRoomData)return; if(!e.target.closest('#gomokuCanvas'))return;
            const g=gomokuRoomData.gomoku; if(!g||g.status!=='playing')return;
            const mc=gomokuRoomData.players?(gomokuRoomData.players.find(p=>p.username===myUsername)||{}).gomoku_color:null;
            if(!mc||mc!==g.current_turn)return;
            const rect=c.getBoundingClientRect(),cs=30,pad=15,sx=c.width/rect.width,sy=c.height/rect.height;
            const mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*sy;
            const x=Math.round((mx-pad)/cs),y=Math.round((my-pad)/cs);
            if(x<0||x>=15||y<0||y>=15)return; if((g.board[y]||[])[x]!==0)return;
            gomokuMove(x,y);
        });

        function gomokuUpdateState(gd){if(gomokuRoomData){gomokuRoomData.gomoku=gd;if(gomokuRoomData.players){const en=new Set(gomokuRoomData.players.map(p=>p.username));for(const n of[gd.player_black,gd.player_white]){if(n&&!en.has(n))gomokuRoomData.players.push({username:n,nickname:n,avatar:'',online:true,is_owner:n===gomokuRoomData.owner_id,gomoku_color:undefined,ready:false});}gomokuRoomData.players.forEach(p=>{if(p.username===gd.player_black){p.gomoku_color=1;p.ready=!!gd.black_ready;}else if(p.username===gd.player_white){p.gomoku_color=2;p.ready=!!gd.white_ready;}else p.gomoku_color=undefined;});}}if(gd.board)drawGomokuBoard(gd);if(gomokuRoomData){const main=document.getElementById('gameMain'),isO=gomokuRoomData.owner_id===myUsername,isP=gomokuRoomData.players&&gomokuRoomData.players.some(p=>p.username===myUsername);main.innerHTML=renderGomokuRoom(gomokuRoomData,isO,isP);drawGomokuBoard(gd);}}

        // ==================== 中国象棋 ====================
        function renderChessRoom(room,isOwner,isPlayer){
            const g=room.chess||{};
            let mc=room.players?(room.players.find(p=>p.username===myUsername)||{}).chess_color:null;
            if(!mc&&g){if(myUsername===g.player_red)mc='red';else if(myUsername===g.player_black)mc='black';}
            let rp=room.players?room.players.find(p=>p.chess_color==='red'):null;
            let bp=room.players?room.players.find(p=>p.chess_color==='black'):null;
            if(!rp&&g.player_red)rp={username:g.player_red,nickname:g.player_red,chess_color:'red'};
            if(!bp&&g.player_black)bp={username:g.player_black,nickname:g.player_black,chess_color:'black'};
            const rr=g.red_ready,br=g.black_ready,sc=room.spectator_count||0;
            let sh='';
            if(g.winner){const w=room.players?room.players.find(p=>p.username===g.winner):null;sh='<span class="chess-status-tag finished">🏆 '+(w?escapeHtml(w.nickname):g.winner)+' 获胜</span>';}
            else if(g.status==='playing'){sh='<span class="chess-status-tag playing">'+(g.current_turn==='red'?'红方':'黑方')+' 回合</span>';if(g.is_check)sh='<span class="chess-status-tag check">⚠ 将军！</span>';}
            else sh='<span class="chess-status-tag waiting">等待中</span>';
            return '<div class="room-detail"><div class="room-detail-header"><span style="font-size:24px;">♚</span><div style="flex:1;"><div style="font-weight:700;font-size:15px;">'+escapeHtml(room.room_name)+'</div><div style="font-size:12px;color:#888;">中国象棋 · '+room.current_players+'/2人'+(sc>0?' · 👁 '+sc+'人观战':'')+(!isPlayer?'<span class="spectator-badge">观战中</span>':'')+'</div></div>'+sh+'</div><div class="room-detail-body"><div class="chess-container"><div class="chess-board-wrapper" id="chessBoardWrapper"><canvas id="chessCanvas" class="chess-board" width="432" height="480" onclick="handleChessClick(event)"></canvas></div><div class="chess-info-bar"><div class="chess-player-tag '+(g.status==='playing'&&g.current_turn==='red'?'active-turn':'')+'"><span class="chess-color-dot red"></span><span>'+(rp?escapeHtml(rp.nickname):'等待加入...')+'</span>'+(g.status!=='playing'?(rr?'<span class="chess-status-tag ready">✅ 已准备</span>':'<span class="chess-status-tag waiting">❌ 未准备</span>'):'')+((rp&&rp.username===myUsername)||(!rp&&g.player_red===myUsername)?'<span style="font-size:11px;color:#888;">(你)</span>':'')+'</div><div class="chess-player-tag '+(g.status==='playing'&&g.current_turn==='black'?'active-turn':'')+'"><span class="chess-color-dot black"></span><span>'+(bp?escapeHtml(bp.nickname):'等待加入...')+'</span>'+(g.status!=='playing'?(br?'<span class="chess-status-tag ready">✅ 已准备</span>':'<span class="chess-status-tag waiting">❌ 未准备</span>'):'')+((bp&&bp.username===myUsername)||(!bp&&g.player_black===myUsername)?'<span style="font-size:11px;color:#888;">(你)</span>':'')+'</div>'+(g.status==='playing'&&mc?'<div style="text-align:center;font-weight:700;color:#f0a500;font-size:13px;">'+(mc===g.current_turn?'⏳ 轮到你走棋了！':'⏳ 等待对手走棋...')+'</div>':'')+'</div></div><div class="chess-actions">'+
            (isPlayer&&g.status==='waiting'?((mc&&((mc==='red'&&!rr)||(mc==='black'&&!br)))?'<button class="chess-btn-ready" onclick="chessReady()">✅ 准备</button>':'')+((mc&&((mc==='red'&&rr)||(mc==='black'&&br)))?'<button class="chess-btn-unready" onclick="chessReady()">❌ 取消准备</button>':''):'')+
            (g.status==='playing'&&mc?'<button class="chess-btn-undo" onclick="chessUndoRequest()">↩ 申请悔棋</button>':'')+
            (isPlayer?'<button class="chess-btn-reset" onclick="chessReset()">🔄 重置游戏</button><button class="btn-leave" onclick="leaveRoom()">🚪 离开房间</button>':(!isPlayer?'<button class="btn-leave" onclick="leaveRoom()">🚪 退出观战</button>':''))+
            (isOwner?'<button class="btn-dismiss" onclick="dismissRoom()">🗑 解散房间</button>':'')+'</div></div></div>';
        }

        function drawChessBoard(cs){
            const c=document.getElementById('chessCanvas'); if(!c)return;
            const ctx=c.getContext('2d'),cols=9,rows=10,cw=48,ch=48,px=24,py=24,bw=cw*(cols-1)+px*2,bh=ch*(rows-1)+py*2;
            c.width=bw;c.height=bh;ctx.fillStyle='#f5deb3';ctx.fillRect(0,0,bw,bh);
            ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.strokeRect(px-8,py-8,cw*(cols-1)+16,ch*(rows-1)+16);
            ctx.strokeStyle='#555';ctx.lineWidth=1;
            for(let i=0;i<cols;i++){ctx.beginPath();ctx.moveTo(px+i*cw,py);ctx.lineTo(px+i*cw,py+(rows-1)*ch);ctx.stroke();}
            for(let i=0;i<rows;i++){ctx.beginPath();ctx.moveTo(px,py+i*ch);ctx.lineTo(px+(cols-1)*cw,py+i*ch);ctx.stroke();}
            ctx.fillStyle='#333';ctx.font='bold 16px serif';ctx.textAlign='center';
            ctx.fillText('楚  河',px+2*cw,py+4.85*ch);ctx.fillText('汉  界',px+(cols-3)*cw,py+4.85*ch);
            ctx.strokeStyle='#999';ctx.lineWidth=1;
            for(const s of[0,3]){const lx=px+s*cw,rx=px+(s+4)*cw;ctx.beginPath();ctx.moveTo(lx,py+4*ch);ctx.lineTo(rx,py+5*ch);ctx.stroke();ctx.beginPath();ctx.moveTo(rx,py+4*ch);ctx.lineTo(lx,py+5*ch);ctx.stroke();}
            for(const[kr,kc]of[[0,3],[7,3]]){const px2=px+kc*cw,py2=py+kr*ch;ctx.beginPath();ctx.moveTo(px2,py2);ctx.lineTo(px2+2*cw,py2+2*ch);ctx.stroke();ctx.beginPath();ctx.moveTo(px2+2*cw,py2);ctx.lineTo(px2,py2+2*ch);ctx.stroke();}
            if(cs.last_move_from&&cs.last_move_to){const[fr,fc]=cs.last_move_from,[tr,tc]=cs.last_move_to;ctx.fillStyle='rgba(255,255,0,0.35)';for(const[r,c2]of[[fr,fc],[tr,tc]])ctx.fillRect(px+c2*cw-cw/2,py+r*ch-ch/2,cw,ch);}
            const board=cs.board; if(!board)return;
            const pr=20;
            for(let r=0;r<rows;r++){for(let c2=0;c2<cols;c2++){const piece=board[r]?.[c2];if(!piece)continue;
                const cx=px+c2*cw,cy=py+r*ch;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx,cy,pr+1,0,Math.PI*2);ctx.fill();
                const grad=ctx.createRadialGradient(cx-3,cy-3,2,cx,cy,pr);grad.addColorStop(0,'#fff8e1');grad.addColorStop(1,'#c8a96e');
                ctx.fillStyle=grad;ctx.beginPath();ctx.arc(cx,cy,pr,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#8b6914';ctx.lineWidth=2;ctx.stroke();
                ctx.fillStyle=piece[0]==='red'?'#c62828':'#111';ctx.font='bold 20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
                ctx.fillText((CHESS_PIECE_NAMES[piece[0]]||{})[piece[1]]||'?',cx,cy+1);}}
            document.querySelectorAll('.chess-selected-dot,.chess-move-hint').forEach(e=>e.remove());
            const wrapper=document.getElementById('chessBoardWrapper'); if(!wrapper)return;
            if(chessSelected){const dot=document.createElement('div');dot.className='chess-selected-dot';dot.style.left=(px+chessSelected.col*cw-9)+'px';dot.style.top=(py+chessSelected.row*ch-9)+'px';wrapper.appendChild(dot);}
            chessMoveHints.forEach(h=>{const d=document.createElement('div');d.className='chess-move-hint';d.style.left=(px+h.col*cw-7)+'px';d.style.top=(py+h.row*ch-7)+'px';d.style.cursor='pointer';d.onclick=()=>chessDoMove(h.row,h.col);wrapper.appendChild(d);});
        }

        function handleChessClick(e){if(!chessRoomData||!chessRoomData.chess)return;const g=chessRoomData.chess;if(g.status!=='playing')return;const mc=getChessMyColor();if(!mc||mc!==g.current_turn)return;
            const c=document.getElementById('chessCanvas');if(!c)return;const cw=48,ch=48,px=24,py=24;
            const rect=c.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
            const col=Math.round((mx-px)/cw),row=Math.round((my-py)/ch);
            if(col<0||col>=9||row<0||row>=10)return;const piece=g.board?.[row]?.[col];
            if(chessSelected){const isHint=chessMoveHints.some(h=>h.row===row&&h.col===col);if(isHint){chessDoMove(row,col);return;}
            if(piece&&piece[0]===mc){chessSelected={row,col};chessMoveHints=[];drawChessBoard(g);return;}
            chessSelected=null;chessMoveHints=[];drawChessBoard(g);}
            else{if(piece&&piece[0]===mc){chessSelected={row,col};chessMoveHints=chessGetMoveHints(row,col,g.board,mc);drawChessBoard(g);}}}

        function chessGetMoveHints(fr,fc,board,color){const h=[];for(let tr=0;tr<10;tr++)for(let tc=0;tc<9;tc++){if(tr===fr&&tc===fc)continue;const t=board[tr]?.[tc];if(t&&t[0]===color)continue;if(chessQuickValid(fr,fc,tr,tc,board,color))h.push({row:tr,col:tc});}return h;}
        function chessQuickValid(fr,fc,tr,tc,board,color){const p=board[fr]?.[fc];if(!p)return false;const pt=p[1],dr=tr-fr,dc=tc-fc,adr=Math.abs(dr),adc=Math.abs(dc);
            if(pt==='rook'){if(fr!==tr&&fc!==tc)return false;return chessPathClear(fr,fc,tr,tc,board);}
            if(pt==='horse'){if(!((adr===2&&adc===1)||(adr===1&&adc===2)))return false;if(adr===2){if(board[fr+(dr>0?1:-1)][fc])return false;}else{if(board[fr][fc+(dc>0?1:-1)])return false;}return true;}
            if(pt==='elephant'){if(adr!==2||adc!==2)return false;if(color==='red'&&tr<5)return false;if(color==='black'&&tr>4)return false;if(board[fr+(dr>0?1:-1)][fc+(dc>0?1:-1)])return false;return true;}
            if(pt==='advisor'){if(adr!==1||adc!==1)return false;if(color==='red'&&(tr<7||tr>9||tc<3||tc>5))return false;if(color==='black'&&(tr<0||tr>2||tc<3||tc>5))return false;return true;}
            if(pt==='king'){if(!((adr===1&&adc===0)||(adr===0&&adc===1)))return false;if(color==='red'&&(tr<7||tr>9||tc<3||tc>5))return false;if(color==='black'&&(tr<0||tr>2||tc<3||tc>5))return false;return true;}
            if(pt==='cannon'){if(fr!==tr&&fc!==tc)return false;const cnt=chessCountBetween(fr,fc,tr,tc,board);return board[tr]?.[tc]?cnt===1:cnt===0;}
            if(pt==='pawn'){if(color==='red'){if(!(adc===0&&dr===-1)&&!(fr<=4&&adc===1&&dr===0))return false;}else{if(!(adc===0&&dr===1)&&!(fr>=5&&adc===1&&dr===0))return false;}return true;}
            return false;}
        function chessPathClear(fr,fc,tr,tc,board){if(fr===tr){const s=tc>fc?1:-1;for(let c=fc+s;c!==tc;c+=s)if(board[fr][c])return false;}else{const s=tr>fr?1:-1;for(let r=fr+s;r!==tr;r+=s)if(board[r][fc])return false;}return true;}
        function chessCountBetween(fr,fc,tr,tc,board){let cnt=0;if(fr===tr){const s=tc>fc?1:-1;for(let c=fc+s;c!==tc;c+=s)if(board[fr][c])cnt++;}else{const s=tr>fr?1:-1;for(let r=fr+s;r!==tr;r+=s)if(board[r][fc])cnt++;}return cnt;}
        function getChessMyColor(){if(!chessRoomData)return null;let c1=(chessRoomData.players||[]).find(p=>p.username===myUsername);if(c1&&c1.chess_color)return c1.chess_color;const g=chessRoomData.chess;if(g){if(myUsername===g.player_red)return'red';if(myUsername===g.player_black)return'black';}return null;}
        async function chessDoMove(tr,tc){if(!chessSelected||!currentRoomId)return;const fr=chessSelected.row,fc=chessSelected.col;chessSelected=null;chessMoveHints=[];try{const r=await fetch('/api/chess/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room_id:currentRoomId,from_row:fr,from_col:fc,to_row:tr,to_col:tc})});const d=await r.json();if(d.code!==200){showToast(d.msg||'落子失败');if(chessRoomData)drawChessBoard(chessRoomData.chess);}}catch(e){}}
        async function chessReady(){if(!currentRoomId)return;try{const r=await fetch('/api/chess/ready',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room_id:currentRoomId})});const d=await r.json();if(d.code===200&&d.data)chessUpdateState(d.data);}catch(e){}}
        async function chessUndoRequest(){if(!currentRoomId)return;try{const r=await fetch('/api/chess/undo/request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room_id:currentRoomId})});const d=await r.json();if(d.code!==200)showToast(d.msg||'申请失败');else showToast('悔棋申请已发送');}catch(e){}}
        async function chessAgreeUndo(){if(!currentRoomId)return;try{const r=await fetch('/api/chess/undo/agree',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room_id:currentRoomId})});const d=await r.json();if(d.code===200&&d.data)chessUpdateState(d.data);else showToast(d.msg||'悔棋失败');}catch(e){}}
        async function chessReset(){if(!currentRoomId)return;if(!confirm('确定重置游戏？'))return;try{const r=await fetch('/api/chess/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room_id:currentRoomId})});const d=await r.json();if(d.code===200&&d.data){chessUpdateState(d.data);refreshLobby();}}catch(e){}}
        function chessUpdateState(cd){if(chessRoomData){chessRoomData.chess=cd;if(chessRoomData.players){const en=new Set(chessRoomData.players.map(p=>p.username));for(const n of[cd.player_red,cd.player_black]){if(n&&!en.has(n))chessRoomData.players.push({username:n,nickname:n,avatar:'',online:true,is_owner:n===chessRoomData.owner_id,chess_color:undefined,ready:false});}chessRoomData.players.forEach(p=>{if(p.username===cd.player_red){p.chess_color='red';p.ready=!!cd.red_ready;}else if(p.username===cd.player_black){p.chess_color='black';p.ready=!!cd.black_ready;}else p.chess_color=undefined;});}}if(chessRoomData){const main=document.getElementById('gameMain'),isO=chessRoomData.owner_id===myUsername,isP=chessRoomData.players&&chessRoomData.players.some(p=>p.username===myUsername);main.innerHTML=renderChessRoom(chessRoomData,isO,isP);}drawChessBoard(cd);}

        // ==================== 飞行棋 ====================
        function initAeroGame(numPlayers){
            const colors=AERO_COLORS.slice(0,numPlayers);
            const players=colors.map(c=>({
                color:c, name:c, pieces:[0,0,0,0], // 0=hangar, 1-56=on track, 57-62=home stretch
                finished:0
            }));
            return {players, currentPlayerIndex:0, dice:null, diceRolled:false, selectablePieces:[], status:'waiting', round:0};
        }

        function getAeroPiecePos(color, pieceIndex, state){
            const pi=state.players.find(p=>p.color===color); if(!pi)return null;
            const v=pi.pieces[pieceIndex]; if(v===0)return{type:'hangar',x:AERO_HANGAR_COORDS[color][pieceIndex].x,y:AERO_HANGAR_COORDS[color][pieceIndex].y};
            if(v>=57&&v<=62)return{type:'home',x:AERO_HOME_COORDS[color][v-57].x,y:AERO_HOME_COORDS[color][v-57].y};
            if(v>=1&&v<=56){const ti=AERO_START_POS[color];const idx=(ti+(v-1))%52;return{type:'track',x:aeroTrackCoords[idx].x,y:aeroTrackCoords[idx].y};}
            return null;
        }

        function getAeroMovablePieces(color, dice, state){
            const pi=state.players.find(p=>p.color===color); if(!pi)return[];
            const mov=[];
            for(let i=0;i<4;i++){
                const v=pi.pieces[i];
                if(dice===6&&v===0){mov.push(i);continue;} // deploy
                if(v===0)continue; // can't move
                if(v>=57&&v<=62){const nv=v+dice;if(nv<=62)mov.push(i);continue;}
                if(v>=1&&v<=56){const nv=v+dice;if(nv<=56)mov.push(i);else if(nv>56&&nv<=62){const hs=nv-56-1;if(hs>=0&&hs<6)mov.push(i);}}
            }
            return mov;
        }

        function applyAeroMove(color, pieceIndex, dice, state){
            const pi=state.players.find(p=>p.color===color); if(!pi)return;
            const v=pi.pieces[pieceIndex];
            if(dice===6&&v===0){pi.pieces[pieceIndex]=1;checkAeroCollision(color,1,state);}
            else if(v>=1&&v<=56){const nv=v+dice;if(nv<=56){pi.pieces[pieceIndex]=nv;checkAeroCollision(color,nv,state);}else if(nv<=62){pi.pieces[pieceIndex]=nv;if(nv===62)pi.finished++;}}
            else if(v>=57){const nv=v+dice;if(nv<=62){pi.pieces[pieceIndex]=nv;if(nv===62)pi.finished++;}}
        }

        function checkAeroCollision(movingColor, trackPos, state){
            const tp=state.players.find(p=>p.color===movingColor); if(!tp)return;
            for(const p of state.players){
                if(p.color===movingColor)continue;
                for(let i=0;i<4;i++){
                    if(p.pieces[i]>=1&&p.pieces[i]<=56&&p.pieces[i]===trackPos){p.pieces[i]=0;return;}
                }
            }
        }

        function drawAeroBoard(state){
            const c=document.getElementById('aeroCanvas'); if(!c)return;
            const ctx=c.getContext('2d'), grid=15, cs=36, pad=18, bs=cs*grid+pad*2;
            c.width=bs;c.height=bs;ctx.fillStyle='#fff8e1';ctx.fillRect(0,0,bs,bs);

            // Draw cross-shape board
            ctx.fillStyle='#fff';ctx.fillRect(pad,pad,cs*6,cs*grid); // left vertical
            ctx.fillRect(pad+cs*9,pad,cs*6,cs*grid); // right vertical
            ctx.fillRect(pad,pad,cs*grid,cs*6); // top horizontal
            ctx.fillRect(pad,pad+cs*9,cs*grid,cs*6); // bottom horizontal
            ctx.strokeStyle='#333';ctx.lineWidth=2;
            ctx.strokeRect(pad,pad,cs*6,cs*grid);ctx.strokeRect(pad+cs*9,pad,cs*6,cs*grid);
            ctx.strokeRect(pad,pad,cs*grid,cs*6);ctx.strokeRect(pad,pad+cs*9,cs*grid,cs*6);

            // Draw hangars
            AERO_COLORS.forEach(c=>{
                const lx=pad,ly=pad;
                let hx,hy;
                if(c==='red'){hx=pad+cs*1;hy=pad+cs*10;}
                if(c==='yellow'){hx=pad+cs*10;hy=pad+cs*1;}
                if(c==='blue'){hx=pad+cs*12;hy=pad+cs*1;}
                if(c==='green'){hx=pad+cs*10;hy=pad+cs*12;}
                ctx.fillStyle=AERO_COLORS_LIGHT[c];ctx.fillRect(hx-30,hy-30,60,60);
                ctx.strokeStyle=AERO_COLORS_HEX[c];ctx.lineWidth=2;ctx.strokeRect(hx-30,hy-30,60,60);
            });

            // Draw track cells
            aeroTrackCoords.forEach((tc,i)=>{
                const cx=pad+tc.x*cs,cy=pad+tc.y*cs;
                ctx.fillStyle='#fff';ctx.fillRect(cx-cs/2,cy-cs/2,cs,cs);
                ctx.strokeStyle='#bbb';ctx.lineWidth=1;ctx.strokeRect(cx-cs/2,cy-cs/2,cs,cs);
                // Color start positions
                for(const[c,sp] of Object.entries(AERO_START_POS)){if(i===sp){ctx.fillStyle=AERO_COLORS_LIGHT[c];ctx.fillRect(cx-cs/2+2,cy-cs/2+2,cs-4,cs-4);}}
            });

            // Draw home stretch markers
            for(const[c,coords] of Object.entries(AERO_HOME_COORDS)){
                coords.forEach((hc,i)=>{
                    const cx=pad+hc.x*cs,cy=pad+hc.y*cs;
                    ctx.fillStyle=AERO_COLORS_LIGHT[c];ctx.fillRect(cx-cs/2+3,cy-cs/2+3,cs-6,cs-6);
                    ctx.strokeStyle=AERO_COLORS_HEX[c];ctx.lineWidth=1;ctx.strokeRect(cx-cs/2+3,cy-cs/2+3,cs-6,cs-6);
                });
            }

            // Draw pieces
            if(!state)return;
            for(const p of state.players){
                for(let i=0;i<4;i++){
                    const pos=getAeroPiecePos(p.color,i,state); if(!pos)continue;
                    const cx=pad+pos.x*cs,cy=pad+pos.y*cs;
                    ctx.fillStyle=AERO_COLORS_HEX[p.color];ctx.beginPath();ctx.arc(cx,cy,cs/2-4,0,Math.PI*2);ctx.fill();
                    ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();
                    ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(i+1,cx,cy);
                }
            }

            // Highlight active player
            if(state.currentPlayerIndex!=null&&state.players[state.currentPlayerIndex]){
                const ac=state.players[state.currentPlayerIndex].color;
                const hcoords=AERO_HANGAR_COORDS[ac];if(hcoords){
                    const hcx=pad+hcoords[0].x*cs,hcy=pad+Math.min(...hcoords.map(h=>h.y))*cs;
                    ctx.strokeStyle=AERO_COLORS_HEX[ac];ctx.lineWidth=3;
                    ctx.beginPath();ctx.arc(hcx,hcy-8,8,0,Math.PI*2);ctx.stroke();
                }
            }
        }

        function renderAeroRoom(room,isOwner,isPlayer){
            const numP=(room.players||[]).length;
            if(!aeroGameState||aeroGameState.status==='waiting'){aeroGameState=initAeroGame(Math.max(numP,1));}
            // Assign players to colors
            const rp=room.players||[];
            aeroGameState.players.slice(0,rp.length).forEach((ap,i)=>{
                ap.name=rp[i].nickname||rp[i].username; ap.username=rp[i].username;
            });

            const sc=room.spectator_count||0;
            const main=document.getElementById('gameMain');

        function renderDrawGuessCanvas(){
            const c=document.getElementById('dgCanvas'); if(!c||c._inited)return;
            c._inited=true;
            const ctx=c.getContext('2d');
            let lastDGX=0,lastDGY=0;
            c.onmousedown=function(e){
                if(drawGuessState.currentDrawer!==myUsername||!drawGuessState.word)return;
                dgIsDrawing=true;
                const r=c.getBoundingClientRect();
                const sx=c.width/r.width,sy=c.height/r.height;
                lastDGX=(e.clientX-r.left)*sx;
                lastDGY=(e.clientY-r.top)*sy;
                ctx.beginPath();ctx.moveTo(lastDGX,lastDGY);
            };
            c.onmousemove=function(e){
                if(!dgIsDrawing||drawGuessState.currentDrawer!==myUsername||!drawGuessState.word)return;
                const rect=c.getBoundingClientRect();
                const sx=c.width/rect.width,sy=c.height/rect.height;
                const x=(e.clientX-rect.left)*sx,y=(e.clientY-rect.top)*sy;
                const prevX=lastDGX,prevY=lastDGY;
                ctx.strokeStyle=dgCurrentTool==='eraser'?'#ffffff':dgCurrentColor;
                ctx.lineWidth=dgLineWidth;ctx.lineCap='round';ctx.lineJoin='round';
                ctx.beginPath();ctx.moveTo(prevX,prevY);ctx.lineTo(x,y);ctx.stroke();
                lastDGX=x;lastDGY=y;
                sendWs({msg_type:'game_message',room_id:currentRoomId,game_type:'draw_guess',sub_type:'drawing',
                    content:JSON.stringify({type:'draw',x,y,prevX,prevY,color:dgCurrentTool==='eraser'?'#ffffff':dgCurrentColor,lineWidth:dgLineWidth})});
            };
            c.onmouseup=c.onmouseleave=function(){dgIsDrawing=false;};
            // Touch support
            c.ontouchstart=function(e){
                if(drawGuessState.currentDrawer!==myUsername||!drawGuessState.word)return;
                e.preventDefault();dgIsDrawing=true;
                const r=c.getBoundingClientRect();
                const sx=c.width/r.width,sy=c.height/r.height;
                const t=e.touches[0];
                lastDGX=(t.clientX-r.left)*sx;
                lastDGY=(t.clientY-r.top)*sy;
                ctx.beginPath();ctx.moveTo(lastDGX,lastDGY);
            };
            c.ontouchmove=function(e){
                if(!dgIsDrawing||drawGuessState.currentDrawer!==myUsername||!drawGuessState.word)return;
                e.preventDefault();
                const rect=c.getBoundingClientRect();
                const sx=c.width/rect.width,sy=c.height/rect.height;
                const t=e.touches[0];const x=(t.clientX-rect.left)*sx,y=(t.clientY-rect.top)*sy;
                const prevX=lastDGX,prevY=lastDGY;
                ctx.strokeStyle=dgCurrentTool==='eraser'?'#ffffff':dgCurrentColor;
                ctx.lineWidth=dgLineWidth;ctx.lineCap='round';ctx.lineJoin='round';
                ctx.beginPath();ctx.moveTo(prevX,prevY);ctx.lineTo(x,y);ctx.stroke();
                lastDGX=x;lastDGY=y;
                sendWs({msg_type:'game_message',room_id:currentRoomId,game_type:'draw_guess',sub_type:'drawing',
                    content:JSON.stringify({type:'draw',x,y,prevX,prevY,color:dgCurrentTool==='eraser'?'#ffffff':dgCurrentColor,lineWidth:dgLineWidth})});
            };
            c.ontouchend=function(){dgIsDrawing=false;};
        }

                    sendWs({msg_type:'game_message',room_id:currentRoomId,game_type:'draw_guess',sub_type:'round_start',content:JSON.stringify({drawer:drawGuessState.currentDrawer,wordChoices:drawGuessState.currentDrawer===myUsername?drawGuessState.wordChoices:[],timer:drawGuessState.timer,round:1})});

        function startDGTimer(){
            clearGameTimers();
            dgTimerInterval=setInterval(()=>{
                if(!drawGuessState||drawGuessState.status!=='playing'||!drawGuessState.word)return;
                drawGuessState.timer--;
                const tel=document.getElementById('dgTimer'); if(tel)tel.textContent=drawGuessState.timer+'s';
                if(drawGuessState.timer<=10){const tel2=document.getElementById('dgTimer');if(tel2)tel2.classList.add('urgent');}

        function endDrawGuessRound(){
            clearGameTimers();
            if(!drawGuessState)return;
            drawGuessState.chat.push({type:'system',text:'⏰ 时间到！答案是：'+drawGuessState.word});
            sendWs({msg_type:'game_message',room_id:currentRoomId,game_type:'draw_guess',sub_type:'round_end',content:JSON.stringify({word:drawGuessState.word,scores:drawGuessState.scores})});
            drawGuessState.word='';drawGuessState.wordChoices=[];drawGuessState.timer=0;drawGuessState.status='playing'; // wait for next round
            viewRoomDetail(currentRoomId);
            // Next round after 3 seconds
            setTimeout(()=>{
                if(!drawGuessState||drawGuessState.status!=='playing')return;
                if(drawGuessState.round>=3){drawGuessState.status='finished';viewRoomDetail(currentRoomId);return;}
                const pl=drawGuessState.players;const curIdx=pl.findIndex(p=>p.username===drawGuessState.currentDrawer);
                const nextIdx=(curIdx+1)%pl.length;drawGuessState.currentDrawer=pl[nextIdx].username;
                drawGuessState.wordChoices=getRandomWords(3);drawGuessState.timer=60;drawGuessState.round++;drawGuessState.chat=[];
                sendWs({msg_type:'game_message',room_id:currentRoomId,game_type:'draw_guess',sub_type:'round_start',content:JSON.stringify({drawer:drawGuessState.currentDrawer,wordChoices:drawGuessState.currentDrawer===myUsername?drawGuessState.wordChoices:[],timer:60,round:drawGuessState.round})});
                viewRoomDetail(currentRoomId);clearDGCanvas();startDGTimer();
            },4000);
        }

        function sendDGGuess(){
            const input=document.getElementById('dgChatInput'); if(!input)return;
            const text=input.value.trim(); if(!text||!drawGuessState)return; input.value='';
            if(drawGuessState.word&&text===drawGuessState.word){// correct guess
                drawGuessState.chat.push({type:'chat',user:myUsername,text:text,correct:true});
                // Update score
                if(!drawGuessState.scores[myUsername])drawGuessState.scores[myUsername]=0;
                drawGuessState.scores[myUsername]+=drawGuessState.timer;
                const drawerScore=drawGuessState.scores[drawGuessState.currentDrawer]||0;
                drawGuessState.scores[drawGuessState.currentDrawer]=drawerScore+5;
                // Update player scores
                (drawGuessState.players||[]).forEach(p=>{p.score=drawGuessState.scores[p.username]||0;});
                sendWs({msg_type:'game_message',room_id:currentRoomId,game_type:'draw_guess',sub_type:'chat',content:JSON.stringify({user:myUsername,text:text,correct:true})});
                sendWs({msg_type:'game_message',room_id:currentRoomId,game_type:'draw_guess',sub_type:'correct_guess',content:JSON.stringify({user:myUsername,scores:drawGuessState.scores})});
                viewRoomDetail(currentRoomId);
                return;
            }
            drawGuessState.chat.push({type:'chat',user:myUsername,text:text,correct:false});
            sendWs({msg_type:'game_message',room_id:currentRoomId,game_type:'draw_guess',sub_type:'chat',content:JSON.stringify({user:myUsername,text:text,correct:false})});
            viewRoomDetail(currentRoomId);
        }

        // ==================== WebSocket 消息处理 ====================
        function handleGameWsMessage(data){
            if(data.type==='kicked'){alert(data.content||'您的账号已在别处登录');wsManualClose=true;if(ws)ws.close();localStorage.removeItem('chat_token');myToken='';location.reload();return;}
            if(data.type==='lobby_update'){document.getElementById('gameOnlineCount').textContent=data.online_count;document.getElementById('gameRoomCount').textContent=data.room_count;refreshLobby();}
            else if(data.type==='room_update'){
                if(currentRoomId===data.room_id){
                    if(data.gomoku&&gomokuRoomData){WSUpdateGomoku(data);}
                    else if(data.chess&&chessRoomData){WSUpdateChess(data);}
                    else {viewRoomDetail(data.room_id);}
                    refreshLobby();
                }
                if(['player_join','player_leave','game_start','game_finish'].includes(data.event))refreshLobby();
            }
            else if(data.type==='room_dismissed'){
                if(currentRoomId===data.room_id){resetAllGameState();currentRoomId=null;showGamePlaceholder();showToast('房间已被解散');}
                refreshLobby();
            }
            else if(data.type==='gomoku_state'){if(currentRoomId===data.room_id&&gomokuRoomData){gomokuUpdateState(data);if(['game_over','game_started','game_reset'].includes(data.event))refreshLobby();}}
            else if(data.type==='gomoku_error'){if(data.msg)console.warn('五子棋错误:',data.msg);}
            else if(data.type==='chess_state'){if(currentRoomId===data.room_id&&chessRoomData){chessUpdateState(data);if(data.event==='check')showToast('将军！');else if(data.event==='checkmate'){showToast('绝杀！'+(data.winner?data.winner+' ':'')+'获胜！');refreshLobby();}else if(data.event==='undo_request'){if(confirm(data.username+' 请求悔棋，是否同意？'))chessAgreeUndo();}else if(['game_start','game_over','game_reset'].includes(data.event)){chessSelected=null;chessMoveHints=[];refreshLobby();}}}
            else if(data.type==='chess_error'){if(data.msg)showToast('象棋错误: '+data.msg);}
            else if(data.type==='game_invite'){ handleGameInvite(data); }
            else if(data.type==='ddz_state'){
                if(data.state) ddzState = data.state;
                if(currentRoomId===data.room_id){ renderDDZGame(); refreshLobby(); }
            }
            else if(data.type==='ddz_private'){
                if(data.state) ddzPrivate = data.state;
                renderDDZGame();
            }
            else if(data.type==='intl_chess_state'){
                if(data.state) intlChessState = data.state;
                if(currentRoomId===data.room_id){ renderIntlChessGame(); refreshLobby(); }
            }
            else if(data.type==='game_message'){
                try{
                    const gd=data.game_type,st=data.sub_type,ct=typeof data.content==='string'?JSON.parse(data.content):data.content;
                    if(gd==='aeroplane_chess'){

function ddzToggleCard(idx){
    if(ddzSelected.has(idx)) ddzSelected.delete(idx);
    else ddzSelected.add(idx);
    renderDDZGame();
}

function ddzHint(){
    ddzSelected.clear();
    // auto-select valid smallest combination
    if(ddzPrivate&&ddzPrivate.myCards){
        const state=ddzState;
        if(state.lastPlayed){
            // Try to find a playable hand
            for(let i=0;i<ddzPrivate.myCards.length;i++){
                ddzSelected.add(i);
                if(i>=0){ renderDDZGame(); break; }
            }
        } else {
            // First play: select smallest single
            ddzSelected.add(0);
        }
        renderDDZGame();
    }
}

    if(!currentRoomId||!ddzSelected.size) return;
    const indices=Array.from(ddzSelected);

        if(data.code!==200){showToast(data.msg||'出牌失败');return;}

function renderChessBoard(state){
    const boardEl = document.getElementById('intlChessBoard');
    if(!boardEl) return;
    const fen = state.fen || 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
    boardEl.innerHTML = '';
    const canvas = document.createElement('canvas');
    canvas.width = 400; canvas.height = 400;
    canvas.style.width = '100%'; canvas.style.maxWidth = '400px';
    canvas.onclick = (e) => intlChessBoardClick(e, canvas, state);
    boardEl.appendChild(canvas);
    drawChessBoardCanvas(canvas, fen);
}

function drawChessBoardCanvas(canvas, fen){
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const sq = w/8;
    const fenParts = fen.split(' ');
    const boardFen = fenParts[0];
    const turn = fenParts[1];
    const flipped = false;

    // Parse FEN
    const pieces = [];
    const rows = boardFen.split('/');
    for(let r=0; r<8; r++){
        let col=0;
        for(const ch of rows[r]){
            if(ch>='1'&&ch<='8'){ col+=parseInt(ch); }
            else{
                pieces.push({row:r, col, piece:ch});
                col++;
            }
        }
    }

    // Draw board
    for(let r=0; r<8; r++){
        for(let c=0; c<8; c++){
            const isLight = (r+c)%2===0;
            ctx.fillStyle = isLight?'#f0d9b5':'#b58863';
            ctx.fillRect(c*sq, r*sq, sq, sq);
        }
    }

    // Draw pieces as text
    const pieceSymbols = {
        'K':'♔','Q':'♕','R':'♖','B':'♗','N':'♘','P':'♙',
        'k':'♚','q':'♛','r':'♜','b':'♝','n':'♞','p':'♟'
    };
    ctx.font = `${sq*0.75}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for(const p of pieces){
        ctx.fillStyle = p.piece === p.piece.toUpperCase()? '#fff':'#000';
        const color = p.piece === p.piece.toUpperCase()?'white':'black';
        ctx.fillText(pieceSymbols[p.piece]||p.piece, p.col*sq+sq/2, p.row*sq+sq/2);
    }
}

let intlChessFrom = null;
function intlChessBoardClick(e, canvas, state){
    if(state.status!=='playing') return;
    const myColor = (state.playerWhite===myUsername)?'white':((state.playerBlack===myUsername)?'black':null);
    if(!myColor) return;
    const turnColor = state.turn;
    if(myColor!==turnColor) return;

    const rect = canvas.getBoundingClientRect();
    const sq = canvas.width/8;
    const scaleX = canvas.width/rect.width;
    const scaleY = canvas.height/rect.height;
    const col = Math.floor((e.clientX-rect.left)*scaleX/sq);
    const row = Math.floor((e.clientY-rect.top)*scaleY/sq);
    if(col<0||col>7||row<0||row>7) return;

    const files = 'abcdefgh';
    const sqName = files[col]+(8-row);

    if(!intlChessFrom){
        intlChessFrom = sqName;
        // Highlight
        const ctx = canvas.getContext('2d');
        ctx.strokeStyle = '#ff0';
        ctx.lineWidth = 3;
        ctx.strokeRect(col*sq, row*sq, sq, sq);
    } else {
        const from = intlChessFrom;
        intlChessFrom = null;
        if(from===sqName) return;
        intlChessMakeMove(from, sqName);
    }
}

async function intlChessMakeMove(from, to){
    if(!currentRoomId) return;
    try{
        const res=await fetch('/api/intl_chess/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room_id:currentRoomId,from,to})});
        const data=await res.json();
        if(data.code!==200){showToast(data.msg||'走棋失败');return;}
        if(data.data)intlChessState=data.data;
        renderIntlChessGame();
    }catch(e){showToast('网络错误');}
}

// ==================== 更新消息处理以支持新游戏 ====================
const origHandleWsMessage = handleWsMessage;
handleWsMessage = function(data){
    // Handle doudizhu state updates
    if(data.type==='ddz_state'){
        if(data.state) ddzState = data.state;
        if(data.event==='game_start'||data.event==='landlord_determined'||data.event==='redeal'){
            ddzPrivate = null;
            loadRoomDetail(currentRoomId);
        }
        if(data.settlement){
            showToast(`游戏结束！${data.settlement.landlordWins?'地主':'农民'}获胜`);
        }
        renderDDZGame();
        return;
    }
    if(data.type==='ddz_private'){
        if(data.state) ddzPrivate = data.state;
        renderDDZGame();
        return;
    }
    // Handle international chess state updates
    if(data.type==='intl_chess_state'){
        if(data.state) intlChessState = data.state;
        if(data.event==='game_over'){
            showToast(`游戏结束！${data.winner==='draw'?'和棋':data.winner==='white'?'白方':'黑方'}获胜`);
        }
        renderIntlChessGame();
        return;
    }
    // Fall through to original handler
    return origHandleWsMessage(data);
};
